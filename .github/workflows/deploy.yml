name: Deploy Showcase

on:
  push:
    branches: [main]
    paths:
      - 'frontend/**'
  workflow_dispatch:

permissions:
  id-token: write
  contents: read

jobs:
  deploy:
    name: Build and Deploy
    runs-on: ubuntu-latest

    steps:
    - name: Checkout code
      uses: actions/checkout@v6

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: 22

    - name: Download fzt assets from latest release
      id: fzt-version
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release download --repo romaine-life/fzt-browser --pattern "fzt.wasm" --pattern "fzt-terminal.js" --pattern "fzt-terminal.css" --pattern "fzt-web.js" --dir frontend
        FZT_VERSION=$(gh release view --repo romaine-life/fzt-browser --json tagName -q '.tagName')
        echo "fzt_version=$FZT_VERSION" >> $GITHUB_OUTPUT
        echo "{\"fztBrowser\":\"$FZT_VERSION\",\"sha\":\"${GITHUB_SHA::7}\",\"deployedAt\":\"$(date -u +%Y-%m-%dT%H:%M:%SZ)\"}" > frontend/version.json
        echo "Wrote version.json: fzt-browser $FZT_VERSION"

    - name: Azure Login via OIDC
      uses: azure/login@v3
      with:
        client-id: ${{ vars.ARM_CLIENT_ID }}
        tenant-id: ${{ vars.ARM_TENANT_ID }}
        subscription-id: ${{ vars.ARM_SUBSCRIPTION_ID }}

    - name: Build frontend
      working-directory: ./frontend
      run: npm run build

    - name: Get Static Web App Deployment Token
      id: static-web-app-token
      run: |
        TOKEN=$(az staticwebapp secrets list --name fuzzy-tiers-showcase-app --resource-group fuzzy-tiers-showcase-rg --query "properties.apiKey" -o tsv)
        echo "::add-mask::$TOKEN"
        echo "deployment_token=$TOKEN" >> $GITHUB_OUTPUT

    - name: Deploy to Azure Static Web App
      uses: Azure/static-web-apps-deploy@v1
      with:
        azure_static_web_apps_api_token: ${{ steps.static-web-app-token.outputs.deployment_token }}
        repo_token: ${{ secrets.GITHUB_TOKEN }}
        action: "upload"
        app_location: "./frontend/dist"
        output_location: ""
        skip_app_build: true

    - name: Verify deployment
      env:
        FZT_VERSION: ${{ steps.fzt-version.outputs.fzt_version }}
      run: |
        echo "Verifying version.json is live..."
        for i in $(seq 1 30); do
          LIVE=$(curl -s https://fzt.romaine.life/version.json 2>/dev/null || echo "{}")
          if echo "$LIVE" | grep -q "$FZT_VERSION"; then
            echo "Version verified: $FZT_VERSION"
            exit 0
          fi
          echo "Attempt $i: waiting for CDN... (got: $LIVE)"
          sleep 5
        done
        echo "::warning::Version verification timed out"
